services:
  db:
    image: postgres:17
    container_name: traders-hall-db
    environment:
      POSTGRES_USER: traders
      POSTGRES_PASSWORD: traders
      POSTGRES_DB: traders_hall
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traders -d traders_hall"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata: